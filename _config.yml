# Конфигурация Jekyll для сайта цеха лазерной резки

title: "Цех лазерной резки и металлообработки"
description: "Лазерная резка металла в Москве — сталь, нержавейка, алюминий. Точность ±0.01мм, сроки от 1 дня. Гибка, покраска, сварка."
baseurl: ""
url: "https://ceh-lazer-rezka.ru"

# Настройки Jekyll
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:title/
timezone: Europe/Moscow

# Плагины
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Исключения
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .github
  - README.md

# Настройки пагинации
paginate: 12
paginate_path: "/blog/page:num/"

# Данные компании
company:
  name: "Цех лазерной резки"
  phone: "+7 (985) 456-37-64"
  email: "info@lasercut.ru"
  address: "Нахабино ул. Новая 7"
  hours: "Пн-Пт 8:00-18:00"

# SEO
lang: ru
author: "Цех лазерной резки"

# Social Media
logo: /assets/images/icon-512.png
social:
  name: "Цех лазерной резки"
  links:
    - https://t.me/lasercut

# Open Graph / Twitter Cards
image: /assets/images/hero.jpg

# Настройки производительности
sass:
  style: compressed

# Коллекции
collections:
  services:
    output: true
    permalink: /services/:name/

# Web3Forms integration
web3forms:
  access_key: "YOUR_ACCESS_KEY_HERE"

# AI Chat Worker URL (Cloudflare Worker)
ai_worker_url: "https://my-worker.prof9ai.workers.dev"
