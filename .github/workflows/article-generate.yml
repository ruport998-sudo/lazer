name: Generate and Publish Article

on:
  schedule:
    # Понедельник, Среда, Пятница в 9:00 UTC+3 (6:00 UTC)
    - cron: '0 6 * * 1,3,5'
  workflow_dispatch: # Ручной запуск

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pyyaml requests
      
      - name: Generate article
        id: generate
        run: |
          python .github/scripts/generate_article.py
      
      - name: Check article quality
        if: steps.generate.outputs.filepath != ''
        continue-on-error: true
        run: |
          python .github/scripts/check_quality.py ${{ steps.generate.outputs.filepath }}
      
      - name: Commit and push
        if: steps.generate.outputs.filepath != ''
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _posts/
          git commit -m "🤖 Auto-publish: ${{ steps.generate.outputs.title }}"
          git push
      
      - name: Get site URL
        id: url
        run: |
          SLUG="${{ steps.generate.outputs.slug }}"
          DATE=$(date +%Y/%m)
          echo "article_url=https://ceh-lazer-rezka.ru/blog/${DATE}/${SLUG}/" >> $GITHUB_OUTPUT
      
      - name: Send Telegram notification
        if: success() && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python .github/scripts/notify_telegram.py \
            "${{ steps.generate.outputs.title }}" \
            "${{ steps.url.outputs.article_url }}" \
            "success"
      
      - name: Notify on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python .github/scripts/notify_telegram.py \
            "Ошибка генерации статьи" \
            "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "error"
