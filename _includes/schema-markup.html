<!-- Organization Schema (global, safe on all pages) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "{{ site.data.business.name }}",
  "legalName": "{{ site.data.business.legalName }}",
  "url": "{{ site.data.business.url }}",
  "logo": "{{ '/assets/images/icon-512.png' | absolute_url }}",
  "description": "{{ site.data.business.description }}",
  "foundingDate": "{{ site.data.business.foundingDate }}",
  "telephone": "{{ site.data.business.phone }}",
  "email": "{{ site.data.business.email }}",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "{{ site.data.business.address.street }}",
    "addressLocality": "{{ site.data.business.address.locality }}",
    "addressRegion": "{{ site.data.business.address.region }}",
    "postalCode": "{{ site.data.business.address.postalCode }}",
    "addressCountry": "{{ site.data.business.address.country }}"
  },
  "areaServed": [
    { "@type": "City", "name": "Москва" },
    { "@type": "State", "name": "Московская область" }
  ],
  "knowsAbout": {{ site.data.business.knowsAbout | jsonify }},
  "hasOfferCatalog": {
    "@type": "OfferCatalog",
    "name": "Услуги металлообработки",
    "itemListElement": [
      {
        "@type": "Offer",
        "itemOffered": { "@type": "Service", "name": "Лазерная резка стали", "description": "Резка стали толщиной 1-20мм с точностью ±0.01мм" }
      },
      {
        "@type": "Offer",
        "itemOffered": { "@type": "Service", "name": "Лазерная резка нержавейки", "description": "Резка нержавеющей стали AISI 304 толщиной 1-12мм" }
      },
      {
        "@type": "Offer",
        "itemOffered": { "@type": "Service", "name": "Лазерная резка алюминия", "description": "Резка алюминия АД31 толщиной 1-10мм" }
      },
      {
        "@type": "Offer",
        "itemOffered": { "@type": "Service", "name": "Гибка металла", "description": "Листогибочные работы до 4мм" }
      },
      {
        "@type": "Offer",
        "itemOffered": { "@type": "Service", "name": "Порошковая покраска", "description": "Прочное полимерное покрытие любого цвета RAL" }
      },
      {
        "@type": "Offer",
        "itemOffered": { "@type": "Service", "name": "Пескоструйная обработка", "description": "Очистка и подготовка металлической поверхности" }
      },
      {
        "@type": "Offer",
        "itemOffered": { "@type": "Service", "name": "Сварочные работы", "description": "Аргонно-дуговая сварка стали и нержавейки" }
      },
      {
        "@type": "Offer",
        "itemOffered": { "@type": "Service", "name": "Лазерная гравировка", "description": "Гравировка на металле, нанесение логотипов" }
      }
    ]
  }
}
</script>

<!-- WebSite Schema (global) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ site.data.business.name }}",
  "url": "{{ site.data.business.url }}",
  "inLanguage": "ru-RU"
}
</script>

<!-- BreadcrumbList Schema (all pages except home) -->
{% if page.url != '/' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Главная",
      "item": "{{ site.url }}"
    }
    {% if page.url contains '/blog/' and page.layout == 'post' %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "Блог",
      "item": "{{ site.url }}/blog/"
    }
    ,{
      "@type": "ListItem",
      "position": 3,
      "name": "{{ page.title }}",
      "item": "{{ page.url | absolute_url }}"
    }
    {% elsif page.url contains '/services/' and page.url != '/services/' %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "Услуги",
      "item": "{{ site.url }}/services/"
    }
    ,{
      "@type": "ListItem",
      "position": 3,
      "name": "{{ page.title }}",
      "item": "{{ page.url | absolute_url }}"
    }
    {% else %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.title }}",
      "item": "{{ page.url | absolute_url }}"
    }
    {% endif %}
  ]
}
</script>
{% endif %}

<!-- ManufacturingFacility Schema (contacts page only) -->
{% if page.url == '/contacts/' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ManufacturingFacility",
  "name": "{{ site.data.business.name }}",
  "url": "{{ site.data.business.url }}",
  "telephone": "{{ site.data.business.phone }}",
  "email": "{{ site.data.business.email }}",
  "image": "{{ '/assets/images/icon-512.png' | absolute_url }}",
  "priceRange": "{{ site.data.business.priceRange }}",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "{{ site.data.business.address.street }}",
    "addressLocality": "{{ site.data.business.address.locality }}",
    "addressRegion": "{{ site.data.business.address.region }}",
    "postalCode": "{{ site.data.business.address.postalCode }}",
    "addressCountry": "{{ site.data.business.address.country }}"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": {{ site.data.business.geo.lat }},
    "longitude": {{ site.data.business.geo.lon }}
  },
  "openingHoursSpecification": {
    "@type": "OpeningHoursSpecification",
    "dayOfWeek": {{ site.data.business.openingHours.days | jsonify }},
    "opens": "{{ site.data.business.openingHours.opens }}",
    "closes": "{{ site.data.business.openingHours.closes }}"
  }
}
</script>
{% endif %}

<!-- Service Schema (service pages only) -->
{% if page.url contains '/services/' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Service",
  "serviceType": "{{ page.title }}",
  "provider": {
    "@type": "Organization",
    "name": "{{ site.data.business.name }}",
    "telephone": "{{ site.data.business.phone }}",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "{{ site.data.business.address.street }}",
      "addressLocality": "{{ site.data.business.address.locality }}",
      "addressRegion": "{{ site.data.business.address.region }}",
      "addressCountry": "{{ site.data.business.address.country }}"
    }
  },
  "areaServed": {
    "@type": "City",
    "name": "Москва"
  }
}
</script>
{% endif %}

<!-- BlogPosting + Article Schema (blog posts only) -->
{% if page.layout == 'post' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ page.title }}",
  "description": "{{ page.description | default: page.excerpt | strip_html | truncate: 160 }}",
  "image": "{{ page.image | default: '/assets/images/icon-512.png' | absolute_url }}",
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.date | date_to_xmlschema }}",
  "author": {
    "@type": "Organization",
    "name": "{{ site.data.business.name }}",
    "url": "{{ site.data.business.url }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ site.data.business.name }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ '/assets/images/icon-512.png' | absolute_url }}"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  },
  "keywords": "{{ page.keywords | default: page.tags | join: ', ' }}",
  "speakable": {
    "@type": "SpeakableSpecification",
    "cssSelector": [".post-content p:first-of-type", ".post-content h2"]
  },
  "inLanguage": "ru-RU",
  "isAccessibleForFree": true
}
</script>
{% endif %}
